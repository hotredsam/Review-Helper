<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Review Helper — vibecode the right way">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1424"/>
      <stop offset="1" stop-color="#1b2440"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.28" r="0.62">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="22" fill="url(#glow)"/>

  <!-- decorative "panels" echoing the app's panel-heavy UI -->
  <g>
    <rect x="892" y="58"  width="248" height="38" rx="9" fill="#22d3ee" opacity="0.10"/>
    <rect x="892" y="108" width="196" height="38" rx="9" fill="#22d3ee" opacity="0.075"/>
    <rect x="892" y="158" width="248" height="38" rx="9" fill="#22d3ee" opacity="0.055"/>
    <rect x="892" y="208" width="150" height="38" rx="9" fill="#22d3ee" opacity="0.04"/>
  </g>

  <!-- accent bar -->
  <rect x="84" y="92" width="6" height="116" rx="3" fill="url(#accent)"/>

  <text x="116" y="150" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="66" font-weight="700" fill="#e6ebff">Review Helper</text>
  <text x="118" y="194" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="25" font-weight="500" fill="#9aa6cc">Vibecode the right way — plan it, understand it, then build it.</text>
  <text x="118" y="244" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#22d3ee" letter-spacing="3">macOS  ·  TAURI 2  ·  RUST + REACT</text>
</svg>
