<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Review Helper — plan it right, then build it">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="19.5" fill="none" stroke="#293548"/>

  <!-- app icon mark -->
  <g transform="translate(64,78)">
    <rect width="120" height="120" rx="27" fill="#161f31" stroke="#3e4e6b" stroke-width="1.5"/>
    <g transform="scale(1.2)">
      <path d="M50 24 L78 35 L50 46 L22 35 Z" fill="#fff"/>
      <path d="M70 39 v10" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
      <g fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M32 60 l8 8 l-8 8"/>
        <line x1="48" y1="76" x2="66" y2="76"/>
      </g>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="216" y="128" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Review Helper</text>
  <text x="218" y="166" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', sans-serif" font-size="20" fill="#94a3b8">Plan it right, then build it. Learn it right, then remember it.</text>

  <!-- 21-phase progress strip -->
  <g transform="translate(218,196)">
    <rect x="0"   width="18" height="10" rx="3" fill="#34d399"/><rect x="22"  width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="44"  width="18" height="10" rx="3" fill="#34d399"/><rect x="66"  width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="88"  width="18" height="10" rx="3" fill="#34d399"/><rect x="110" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="132" width="18" height="10" rx="3" fill="#34d399"/><rect x="154" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="176" width="18" height="10" rx="3" fill="#34d399"/><rect x="198" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="220" width="18" height="10" rx="3" fill="#34d399"/><rect x="242" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="264" width="18" height="10" rx="3" fill="#34d399"/><rect x="286" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="308" width="18" height="10" rx="3" fill="#34d399"/><rect x="330" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="352" width="18" height="10" rx="3" fill="#34d399"/><rect x="374" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="396" width="18" height="10" rx="3" fill="#34d399"/><rect x="418" width="18" height="10" rx="3" fill="#34d399"/>
    <rect x="440" width="18" height="10" rx="3" fill="#a78bfa"/>
  </g>
  <text x="218" y="232" font-family="-apple-system, 'SF Pro Text', sans-serif" font-size="14" fill="#64748b">21 / 21 phases shipped &#160;·&#160; 159 + 103 tests &#160;·&#160; the model never writes your code</text>

  <!-- terminal card -->
  <g transform="translate(764,52)">
    <rect width="372" height="196" rx="14" fill="#0b1220" stroke="#27344a" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="5.5" fill="#f87171"/><circle cx="44" cy="24" r="5.5" fill="#fbbf24"/><circle cx="64" cy="24" r="5.5" fill="#34d399"/>
    <g font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15.5">
      <text x="24" y="62"  fill="#64748b">$ <tspan fill="#e2e8f0">review-helper</tspan></text>
      <text x="24" y="92"  fill="#34d399">✓ <tspan fill="#cbd5e1">assess</tspan>   <tspan fill="#fbbf24">64</tspan><tspan fill="#64748b"> → </tspan><tspan fill="#34d399">82</tspan></text>
      <text x="24" y="120" fill="#34d399">✓ <tspan fill="#cbd5e1">grill</tspan>    <tspan fill="#94a3b8">coverage</tspan> <tspan fill="#34d399">87%</tspan></text>
      <text x="24" y="148" fill="#34d399">✓ <tspan fill="#cbd5e1">plan</tspan>     <tspan fill="#94a3b8">7 phases → GitHub</tspan></text>
      <text x="24" y="176" fill="#a78bfa">▸ <tspan fill="#cbd5e1">learn</tspan>    <tspan fill="#94a3b8">12 cards due</tspan></text>
    </g>
  </g>
</svg>
