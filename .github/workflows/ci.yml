name: CI

on:
  push:
    branches: [main, planning]
  pull_request:

jobs:
  test:
    # Pinned (not macos-latest) so signed/notarized release artifacts and the
    # toolchain stay reproducible across runs.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Secrets gate
        run: python3 scripts/scan_secrets.py $(git ls-files)

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Typecheck + build (frontend)
        run: npm run build

      - name: Frontend tests
        run: npm test

      # Backend unit tests (excludes #[ignore] real-model/keychain tests that
      # need credentials). Covers the model providers, structured-proposal
      # parsing, plan-merge status preservation, and issue matching. The
      # app_info command is a build-health unit test, not a UI/bridge smoke test.
      - name: Backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      # Validate the Tauri backend + config compile (catches plugin/config
      # errors). Does NOT bundle, sign, or notarize — those need credentials
      # and run locally per RELEASE.md.
      - name: Build backend (config validation)
        run: cargo build --manifest-path src-tauri/Cargo.toml
