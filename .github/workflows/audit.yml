name: Dependency audit
on:
  schedule: [{ cron: "15 8 * * 1" }]
  workflow_dispatch:
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with: { token: "${{ secrets.GITHUB_TOKEN }}" }
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm audit --omit=dev --audit-level=high
